program: main.py
method: bayes
metric:
  name: fopng/eval/average_accuracy  # Optimize for retention
  goal: maximize
parameters:
  # --- CONSTANTS (Locked to the 'good run' baseline) ---
  task:
    value: "permuted_mnist"
  methods:
    value: "fopng"
  num_tasks:
    value: 10
  seed:
    value: 1234
  alpha:
    value: 0.3
  embedding_dim:
    value: 8

  fisher_samples:
    value: 1024
  lam:
    value: 0.001
  lr:
    value: 0.005
  epochs:
    value: 5

  # --- PRIMARY SWEEP VARIABLES ---
  
  # Sweeping around the successful value of 100
  hyper_hidden_dim:
    distribution: int_uniform
    min: 50
    max: 120
    
  # Sweeping subspace capacity. 
  # With grads_per_task=100 and 10 tasks, 1000 is the theoretical max needed.
  max_directions:
    distribution: int_uniform
    min: 100
    max: 1000

  grads_per_task:
    distribution: int_uniform
    min: 40
    max: 100

# Command formatting to safely pass args to main.py
command:
  - ${env}
  - python
  - ${program}
  - ${args}